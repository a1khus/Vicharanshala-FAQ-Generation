version: '3.9'

services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: samagama-server
    ports:
      - '5001:5001'
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://mongo:27017/samagama
      - JWT_SECRET=docker_dev_jwt_secret_change_me
      - JWT_REFRESH_SECRET=docker_dev_refresh_secret_change_me
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/src:/app/src
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend Dev Server ──────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: samagama-client
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5001/api/v1
    volumes:
      - ./client/src:/app/src
    depends_on:
      - server
    restart: unless-stopped

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: samagama-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
